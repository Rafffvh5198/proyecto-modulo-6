{% extends "base.html" %}

{% block titulo  %}
Editar Proyecto
{% endblock  %}

{% block contenido %}
<main>
     <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <h1 class="text-center my-5" >Editar Proyecto</h1>
                <form method="POST">
                    {% csrf_token %}          
                    {{ form.as_p }}
                    <button class="btn btn-success" type="submit">Guardar Cambios</button>
                    <a href="{% url 'proyectos' %}">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</main>
{% endblock contenido %}
