{% extends "base.html" %}

{% block titulo  %}
Registrar Usuario
{% endblock  %}

{% block contenido %}
<main>
     <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <h1 class="text-center my-5" >Registrar Usuario</h1>
                <form method="POST">
                    {% csrf_token %}          
                    {{ form.as_p }}
                    <button class="btn btn-success" type="submit">
                    Registrarse
                    </button>
                </form>
            </div>
        </div>
    </div>
</main>
{% endblock contenido %}
