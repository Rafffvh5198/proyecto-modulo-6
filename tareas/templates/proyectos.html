{% extends "base.html" %}

{% block titulo %}
Proyectos
{% endblock %}

{% block contenido %}
    <main>
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8"> 
                    <h1 class="text-center my-5">Mis Proyectos</h1>
                    <table class="table table-bordered">
                        <thead>
                            <tr class="table-success">
                                <th>#</th>
                                <th>Nombre</th>
                                <th>Descripción</th>
                                <th>Detalle</th>
                            </tr>
                        </thead>
                        <tbody>

                            {% for proyecto in proyectos %}
                            <tr>
                                <td> {{proyecto.id}}</td>
                                <td> {{proyecto.nombre}}</td>
                                <td> {{proyecto.descripcion|truncatechars:50}}</td>
                                <td><a class="nav-link" href="{% url 'detalle_proyecto' proyecto.id %}">Ver Proyecto</a></td>
                            </tr>
                            {% endfor %}

                        </tbody>

                    </table>
                </div>
            </div>
        </div>
    </main>
{% endblock %}
